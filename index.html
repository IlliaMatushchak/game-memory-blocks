<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="settings">
      <form id="form-settings" action="">
        <label>
          Rows: <input type="number" id="rows" value="3" min="2" max="6" />
        </label>
        <label>
          Columns: <input type="number" id="cols" value="3" min="2" max="6" />
        </label>
        <label>
          Appearance Duration (sec):
          <input type="number" id="appearance" value="1" min="1" max="10" />
        </label>
        <label>
          Answer Duration (sec):
          <input type="number" id="answer" value="5" min="1" max="20" />
        </label>
        <div>
          <button type="submit" id="btn-save-settings">Save</button>
          <button type="reset">Reset</button>
          <button type="button" id="btn-close-settings">Close</button>
        </div>
      </form>
    </div>
    <header>
      <h1>Memory game</h1>
      <menu>
        <ul>
          <li><button id="btn-start">Start</button></li>
          <li><button id="btn-show-settings">Settings</button></li>
        </ul>
      </menu>
    </header>
    <main>
      <div id="board-container"></div>
      <div id="info-container">
        <h2>Score: <span id="score">0</span></h2>
      </div>
    </main>

    <script src="./block.js"></script>
    <script src="./board.js"></script>
    <script src="./game-manager.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
