<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Гра на пам'ять</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button id="btn-fullscreen"></button>
    <div class="settings">
      <form id="form-settings" action="">
        <label>
          Кількість рядків:
          <input type="number" id="rows" required value="3" min="2" max="6" />
          <span data-error-msg="Тільки від 2 до 6"></span>
        </label>
        <label>
          Кількість колонок:
          <input type="number" id="cols" required value="3" min="2" max="6" />
          <span data-error-msg="Тільки від 2 до 6"></span>
        </label>
        <label>
          Час показу (с):
          <input type="number" id="appearance" required value="1" min="1" max="10" />
          <span data-error-msg="Тільки від 1 до 10"></span>
        </label>
        <label>
          Час на відповідь (с):
          <input type="number" id="answer" required value="5" min="1" max="20" />
          <span data-error-msg="Тільки від 1 до 20"></span>
        </label>
        <div>
          <button type="submit" id="btn-save-settings">Зберегти</button>
          <button type="reset">Cкинути</button>
          <button type="button" id="btn-close-settings">Закрити</button>
        </div>
      </form>
    </div>
    <header>
      <h1>Гра на пам'ять</h1>
      <menu>
        <ul>
          <li><button id="btn-start">Старт</button></li>
          <li><button id="btn-show-settings">Параметри</button></li>
        </ul>
      </menu>
    </header>
    <main>
      <div id="info-container">
        Кількість відповідей: <span id="score">0</span> | Час:
        <span id="time">0</span>
        <small>с</small>
      </div>
      <div id="board-container"></div>
    </main>
  </body>
</html>
